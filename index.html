<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- This line ensures that the webpage is responsive and displays correctly on different devices by setting the viewport width to the device's width and the initial zoom level to 1.0. -->
    <title>JS Calculator | Mbuso</title> <!--Browser tab title-->
    <link rel="stylesheet" href="style.css" /> <!--link to CSS file-->

</head>
<body>
    <div class="calculator"> <!-- Main container for the calculator-->
    
    <div class="display"> <!-- Display screen for calculator-->
      <div class="previous-operand"></div> <!--shows previous input or result (e.g., 5 + )-->
      <div class="current-operand">0</div> <!--shows current input or result (e.g., 5)-->
    </div>

    <div class="buttons"> <!-- Container forall calculator buttons-->
    <button onclick="clearDisplay()"class="clear span-two">C</button>
    <button onclick="deleteLast()"class="delete">DEL</button>
    <button onclick="appendToDisplay('/')"class="operator">/</button>

    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('9')">9</button>
    <button onclick="appendToDisplay('*')"class="operator">x</button>

    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('6')">6</button>
    <button onclick="appendToDisplay('-')" class="operator">-</button>

    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('3')">3</button>
    <button onclick="appendToDisplay('+')" class="operator">+</button>

    <button onclick="appendToDisplay('0')" class="number span-two">0</button>
    <button onclick="appendToDisplay('.')" class="number">.</button>
    <button onclick="calculate()" class="equals">=</button>
    </div>

</div>

<script src="script.js"></script> <!--link to JavaScript file that contains the logic for the calculator's functionality, such as handling button clicks, updating the display, and performing calculations.-->
</body>
</html>
